<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DarkFox Voxel Engine</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="ui-layer">
        <div id="start-menu">
            <h1>DARKFOX VOXEL</h1>
            <div class="btn-group">
                <button id="btn-pc">START PC MODE</button>
                <button id="btn-mobile">START MOBILE MODE</button>
            </div>
            <p id="peer-status">ID: Generating...</p>
        </div>

        <div id="mobile-controls" class="hidden">
            <div id="joystick-zone"></div>
            <button id="btn-jump">JUMP</button>
            <button id="btn-action">PLACE</button>
        </div>

        <div id="hotbar">
            <div class="slot active" data-color="0x55aa55">GRASS</div>
            <div class="slot" data-color="0x8B4513">DIRT</div>
            <div class="slot" data-color="0x808080">STONE</div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="core.js"></script>
</body>
</html>
