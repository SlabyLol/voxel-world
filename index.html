<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voxel World - DarkFox Co.</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { display: block; }
        
        /* UI Elements */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference; }
        
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; border: 2px solid #333; }
        .slot { width: 40px; height: 40px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; cursor: pointer; }
        .slot.active { border-color: white; background: rgba(255,255,255,0.2); }

        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 30px; border-radius: 10px; text-align: center; z-index: 100; }
        .skin-opt { display: inline-block; width: 60px; height: 60px; margin: 10px; border: 3px solid transparent; cursor: pointer; border-radius: 5px; }
        .skin-opt:hover { border-color: #55ff55; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #55ff55; border: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    
    <div id="menu">
        <h1>DARKFOX VOXEL</h1>
        <p>Select your Player Color:</p>
        <div id="skin-list">
            <div class="skin-opt" style="background: #ff5555;" onclick="setSkin(0xff5555)"></div>
            <div class="skin-opt" style="background: #5555ff;" onclick="setSkin(0x5555ff)"></div>
            <div class="skin-opt" style="background: #ffff55;" onclick="setSkin(0)ffff55"></div>
        </div>
        <br>
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="hotbar">
        <div class="slot active" onclick="selectBlock(0, 0x55aa55)" id="slot0">Grass</div>
        <div class="slot" onclick="selectBlock(1, 0x8B4513)" id="slot1">Dirt</div>
        <div class="slot" onclick="selectBlock(2, 0x808080)" id="slot2">Stone</div>
        <div class="slot" onclick="selectBlock(3, 0xffffff)" id="slot3">Cloud</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

        // Variables
        let scene, camera, renderer, controls, playerHand;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let selectedColor = 0x55aa55;
        const objects = [];
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 2;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            // Initial Floor
            const geo = new THREE.BoxGeometry(1, 1, 1);
            for(let x = -5; x < 5; x++) {
                for(let z = -5; z < 5; z++) {
                    const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0x55aa55 }));
                    mesh.position.set(x, 0, z);
                    scene.add(mesh);
                    objects.push(mesh);
                }
            }

            // Input listeners
            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
            });
            document.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') moveForward = false;
                if(e.code === 'KeyS') moveBackward = false;
                if(e.code === 'KeyA') moveLeft = false;
                if(e.code === 'KeyD') moveRight = false;
            });

            // Interaction (Click to Place/Remove)
            window.addEventListener('mousedown', (e) => {
                if(!controls.isLocked) return;
                
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const intersects = raycaster.intersectObjects(objects);

                if (intersects.length > 0) {
                    const intersect = intersects[0];
                    if (e.button === 0) { // Left Click: Remove
                        if(intersect.object.position.y !== 0) { // Don't remove floor
                            scene.remove(intersect.object);
                            objects.splice(objects.indexOf(intersect.object), 1);
                        }
                    } else if (e.button === 2) { // Right Click: Place
                        const pos = intersect.point.add(intersect.face.normal.clone().multiplyScalar(0.5));
                        const newBlock = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: selectedColor }));
                        newBlock.position.set(Math.round(pos.x), Math.round(pos.y), Math.round(pos.z));
                        scene.add(newBlock);
                        objects.push(newBlock);
                    }
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const delta = 0.1;
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();
                if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * delta;
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
            }
            renderer.render(scene, camera);
        }

        // Global functions for UI
        window.startGame = () => {
            document.getElementById('menu').style.display = 'none';
            controls.lock();
        };

        window.setSkin = (color) => {
            console.log("Skin color set to:", color);
            // In a real multiplayer game, this would set your mesh color for others
        };

        window.selectBlock = (id, color) => {
            selectedColor = color;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById('slot' + id).classList.add('active');
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
